name: Node CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install root deps
        run: |
          npm install
      - name: Install client and server deps
        run: |
          cd client && npm install && npm run build || true
          cd ../server && npm install || true
      - name: Lint (optional)
        run: echo "Add linting step if desired"
